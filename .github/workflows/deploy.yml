name: Deploy solvexo-web
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /home/deploy/apps/solvexo-web
            git pull origin main
            npm ci
            npm run build
            pm2 restart solvexo-web || pm2 start npm --name "solvexo-web" -- start
            pm2 save
